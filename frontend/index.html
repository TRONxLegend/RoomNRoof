<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary SEO Meta -->
  <title>Room & Roof Reality | Buy, Sell & Rent Premium Properties</title>
  <meta
    name="description"
    content="Room & Roof Reality helps you buy, sell, and rent residential & commercial properties with trusted real estate experts. Find your perfect home today."
  />

  <!-- Keywords (Low impact but safe) -->
  <meta
    name="keywords"
    content="real estate, buy property, rent home, sell property, real estate agency, apartments, commercial property"
  />

  <!-- Author -->
  <meta name="author" content="Room & Roof Reality" />

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap"
    rel="stylesheet"
  />

  <!-- Open Graph (Social Media SEO) -->
  <meta property="og:title" content="Room & Roof Reality | Trusted Real Estate Partner" />
  <meta
    property="og:description"
    content="Discover premium residential and commercial properties with Room & Roof Reality. Your trusted real estate partner."
  />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://roomandroofreality.com" />
  <meta property="og:image" content="/og-image.png" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Room & Roof Reality" />
  <meta
    name="twitter:description"
    content="Buy, sell, or rent properties with confidence. Room & Roof Reality makes real estate simple."
  />

  <!-- Robots -->
  <meta name="robots" content="index, follow" />
</head>


<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
